<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🌡 Temperature Converter</h1>
        <p class="subtitle">
            Convert temperatures instantly between Celsius, Fahrenheit, and Kelvin.
        </p>

        <div class="input-group">
            <label for="temperature">Enter Temperature</label>
            <input
                type="number"
                id="temperature"
                placeholder="Enter temperature"
                step="any"
            >
        </div>

        <div class="input-group">
            <label for="unit">Select Input Unit</label>

            <select id="unit">
                <option value="celsius">Celsius (°C)</option>
                <option value="fahrenheit">Fahrenheit (°F)</option>
                <option value="kelvin">Kelvin (K)</option>
            </select>
        </div>

        <button id="convertBtn" onclick="convertTemperature()">
            Convert
        </button>

        <p id="error" class="error"></p>

        <div class="result-box">
            <h2>Converted Values</h2>

            <p><strong>Celsius:</strong> <span id="celsiusResult">--</span></p>

            <p><strong>Fahrenheit:</strong> <span id="fahrenheitResult">--</span></p>

            <p><strong>Kelvin:</strong> <span id="kelvinResult">--</span></p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
